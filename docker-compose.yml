services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3001:8080"
    volumes:
      - open-webui:/app/backend/data
      - ./ssl/cert.pem:/app/cert.pem
      - ./ssl/key.pem:/app/key.pem
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "443:443"
    volumes:
      - ./nginx/conf.d/:/etc/nginx/conf.d/
      - ./ssl/cert.pem:/cert.pem
      - ./ssl/key.pem:/key.pem
    depends_on:
      - open-webui
    restart: unless-stopped

  kokoro-web:
    image: ghcr.io/eduardolat/kokoro-web:latest
    ports:
      - "3000:3000"
    environment:
      # Change this to any secret key to use as your OpenAI compatible API key
      - KW_SECRET_API_KEY=<your-secret-key>
    volumes:
      - ./kokoro-cache:/kokoro/cache
    restart: unless-stopped

volumes:
  open-webui:

# Ensure services are on the same network 
networks:
  default:
    driver: bridge
