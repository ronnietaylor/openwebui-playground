services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3001:8080"
    volumes:
      - open-webui:/app/backend/data
      - ./ssl/cert.pem:/app/cert.pem
      - ./ssl/key.pem:/app/key.pem

  nginx:
    image: nginx:latest
    ports:
      - "443:443"
    volumes:
      - ./nginx/conf.d/:/etc/nginx/conf.d/
      - ./ssl/cert.pem:/cert.pem
      - ./ssl/key.pem:/key.pem

volumes:
  open-webui: