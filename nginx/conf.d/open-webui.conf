# Define an upstream block for the backend service
upstream open_webui_backend {
    # Use the service name from docker-compose.yml
    server open-webui:8080;

    # Number of idle keepalive connections to keep open
    keepalive 32;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /cert.pem;
    ssl_certificate_key /key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        # Use the named upstream
        proxy_pass http://open_webui_backend;
        proxy_http_version 1.1;

        # Preserve host and client information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support - Keep these headers
        proxy_set_header Upgrade $http_upgrade;
        # Clear the Connection header for keepalive to upstream
        # Nginx handles the 'upgrade' connection to the client separately
        proxy_set_header Connection "";

        # ... existing buffering, timeout, body size settings ...
        proxy_buffering off;
        client_max_body_size 50M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Remove this line - it forces Content-Type even if backend sends something else
        # add_header Content-Type application/json always;
    }

    # ... existing error page handling ...
    error_page 502 /502.html;
    location = /502.html {
        internal;
        default_type text/html;
        return 502 '<html><body><h1>502 Bad Gateway</h1></body></html>';
    }
}
